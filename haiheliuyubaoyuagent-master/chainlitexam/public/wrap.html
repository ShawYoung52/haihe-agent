<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chainlit GIS Wrap</title>
</head>
<body>
  <iframe
    id="clFrame"
    src="http://localhost:8003"
    width="900"
    height="760"
    style="border: 1px solid #ddd;"
  ></iframe>

  <script>
    window.addEventListener("message", function (e) {
      // 仅接收来自 Chainlit iframe 的 postMessage
      if (e.origin !== "http://localhost:8003") return;
      console.log("[WRAP] 收到消息 origin=", e.origin);
      console.log("[WRAP] 原始事件=", e);
      console.log("[WRAP] data=", e.data);
    });
  </script>
</body>
</html>
