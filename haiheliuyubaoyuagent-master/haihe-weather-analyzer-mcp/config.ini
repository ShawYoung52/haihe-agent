[common]
app = haihe-weather-analyzer-mcp
; 场景 HTTP / GIS：见环境变量 EMERGENCY_HTTP_BASE、SCENARIO_MAP_RENDER（wms_sql 为默认，设 geojson 则整包矢量）
# ====================================================================
# 必须修改：改为你自己的路径
# ====================================================================

[log]
logdir = D:/gzt/data/logs
;logdir = /run/media/root/55adb75e-d66d-4976-af62-b3db449bcd83/EV/tjbs/logs
level = INFO

[paths]
ecData = /CMADAAS/DATA/NAFP/F_0010_0002_R001/exchange/yyyyMMdd
; EC 累计降水查找根（传给 collect / 预报队列）：GRIB 在 {EC_AIFS}/{年}/{YYYYMMDD}/ 时，建议直接填 EC_AIFS 根目录，例如：
; ecOutput = /home/ev/data/ec/EC_AIFS
; 仅当产物 tif 在扁平 output 下时再用 .../EC_AIFS/output（此时仍会通过上一级拼接按日目录）。
; 本地调试：固定从 D:/tj/data 读取累计降水栅格（支持递归检索）
; 预报专题图会按起报时次 + 时效（24/48/72h）在该目录内匹配 tif/grib
ecOutput = D:/tj/data
; ecAifsRoot 仅作文档说明，代码读 EC_AIFS_ROOT；Linux 示例：export EC_AIFS_ROOT=/home/ev/data/ec/EC_AIFS
boundary_shp = C:/Users/gaozr/Desktop/fsdownload/海河流域边界.shp
city_boundary_shp = E:/tj/city_border_in_haihe.shp
graph = E:/tj/line/result/river_directed_v4_asis.pkl

[postgres]
host = 211.157.132.19
port = 48091
dbname = hhly
user = postgres
password = postgres
schema = public
srid = 4326
river_table = haihe_river_directed_simple_v5
river_table_full = haihe_river_directed_full_v5
; 246 分区面表（需含 geom，与站点落区求交后并集再与河系求交）
zone256_table = haihe_246_zone
; 动态矢量 WMS：登记 ST_AsGeoJSON+视口过滤 SQL 的表名（需可写，首次登记时自动建表）
; gis_wms_sql_table = hh_gis_wms_sql
sslmode = disable
connect_timeout = 5

; Tomcat 部署 GeoServer WAR 后，一般为 http://主机:端口/geoserver
; 累计降水栅格在 GeoServer 中发布为 WMS 图层，将下列 layer_* 填为「工作区:图层名」
[geoserver]
base_url = http://127.0.0.1:8090/geoserver
wms_path = /wms
layer_obs_cumulative_12h = nee:obs_apcp_12h
layer_obs_cumulative_24h = nee:obs_apcp_24h
layer_obs_cumulative_36h = nee:obs_apcp_36h
layer_obs_cumulative_48h = nee:obs_apcp_48h
layer_fcst_cumulative_6h = nee:fcst_apcp_6h
layer_fcst_cumulative_12h = nee:fcst_apcp_12h
layer_fcst_cumulative_24h = nee:fcst_apcp_24h
layer_fcst_cumulative_36h = nee:fcst_apcp_36h
layer_fcst_cumulative_48h = nee:fcst_apcp_48h
layer_fcst_cumulative_60h = nee:fcst_apcp_60h
layer_fcst_cumulative_72h = nee:fcst_apcp_72h

[chainlit_postgres]
host = 211.157.132.19
port = 48091
dbname = tjznt
user = postgres
password = postgres
schema = public
srid = 4326
sslmode = disable
connect_timeout = 5