name: Python checks

on:
  pull_request:
  push:
    branches:
      - main
      - chore/web-cleanup-20260702

jobs:
  repository-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run repository health checks
        run: python scripts/check_repository.py
